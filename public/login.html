<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — SYNAPSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/theme.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    [data-theme="light"] {
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.05);
      --text-main: #0f172a;
      --text-muted: #64748b;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #0a0a0f;
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      filter: blur(80px);
      border-radius: 50%;
      animation: move 20s infinite alternate;
    }

    .blob-1 { top: -10%; left: -10%; }
    .blob-2 { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%); }

    @keyframes move {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(50px, 50px) scale(1.1); }
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-card h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .login-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    [data-theme="light"] .form-group input {
      background: rgba(255, 255, 255, 0.5);
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 0.5rem;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
    }

    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      transition: 0.3s;
    }

    .back-link:hover {
      color: var(--text-main);
    }

    .theme-toggle {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="bg-animation">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="theme-toggle">
        <button onclick="toggleTheme()" style="border:none; background:transparent; cursor:pointer;" title="Toggle Theme">
          <span class="theme-icon">☀️</span>
        </button>
      </div>

      <div class="login-header">
        <div class="login-logo">⬡ SYNAPSE ADMIN</div>
        <h1>Admin Portal</h1>
        <p>Enter your credentials to manage portal</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Secure Sign In →</button>

      <a href="/" class="back-link">← Return to Public Portal</a>
    </div>
  </div>

  <script>
    fetch('/auth/status').then(r => r.json()).then(d => {
      if (d.loggedIn) window.location.href = '/admin/dashboard';
    });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginError');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      err.style.display = 'none';
      if (!username || !password) { showError('Credentials required.'); return; }

      btn.disabled = true; btn.textContent = 'Verifying...';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) { window.location.href = '/admin/dashboard'; }
        else { showError(data.error || 'Access denied.'); }
      } catch (e) { showError('System error. Try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Secure Sign In →'; }
    }

    function showError(msg) { const e = document.getElementById('loginError'); e.textContent = msg; e.style.display = 'block'; }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
